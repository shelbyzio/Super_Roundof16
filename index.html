<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE ONE SUPER CUP KNOCKOUT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; color: #1e293b; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="bg-[#003399] border-b-4 border-white sticky top-0 z-50 shadow-md">
        <div class="max-w-7xl mx-auto px-3 py-3 flex flex-row justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-white p-1 rounded-lg h-9 w-9 overflow-hidden flex items-center justify-center">
                    <img src="https://i.pinimg.com/736x/49/2c/50/492c50ccd980032ad25040e5b3e4b3cf.jpg" alt="Serie A" class="h-full w-full object-contain">
                </div>
                <div>
                    <h1 class="text-sm font-black text-white">THE ONE <span class="text-white">SUPER CUP</span></h1>
                    <p class="text-[8px] text-blue-200 font-bold uppercase tracking-widest">ROUND OF 16</p>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-3 py-5 flex-1 w-full">
        <div class="grid grid-cols-2 gap-2 mb-5">
            <div class="bg-white border border-blue-100 p-3 rounded-xl flex items-center gap-2 shadow-sm">
                <i class="fa-solid fa-shield-halved text-[#003399] text-sm"></i>
                <div><span class="text-[8px] text-slate-500 block uppercase">TEAMS</span><span class="text-sm font-bold text-slate-800">16</span></div>
            </div>
            <div class="bg-white border border-blue-100 p-3 rounded-xl flex items-center gap-2 shadow-sm">
                <i class="fa-solid fa-futbol text-[#003399] text-sm"></i>
                <div><span class="text-[8px] text-slate-500 block uppercase">MATCHES</span><span class="text-sm font-bold text-slate-800">8</span></div>
            </div>
        </div>

        <div class="bg-[#003399] p-3 rounded-xl shadow-lg mb-4">
            <h2 class="text-sm font-black text-white text-center uppercase tracking-wider">Round of 16 Fixtures</h2>
        </div>

        <div class="grid grid-cols-1 gap-3" id="fixtures-grid">
            <!-- Matches will be injected here -->
        </div>
    </main>

    <script>
        const TEAMS_LIST = [
            { id: "INT", name: "Leeds", logo: "https://upload.wikimedia.org/wikipedia/en/5/54/Leeds_United_F.C._logo.svg", tg: "https://t.me/jelium11" },
            { id: "MIL", name: "Liverpool", logo: "https://upload.wikimedia.org/wikipedia/en/0/0c/Liverpool_FC.svg", tg: "https://t.me/Badrul11" },
            { id: "JUV", name: "Man City", logo: "https://upload.wikimedia.org/wikipedia/en/thumb/e/eb/Manchester_City_FC_badge.svg/250px-Manchester_City_FC_badge.svg.png", tg: "https://t.me/iz_szlai" },
            { id: "LAZ", name: "Atletcio Madrid", logo: "https://upload.wikimedia.org/wikipedia/en/f/f9/Atletico_Madrid_Logo_2024.svg", tg: "https://t.me/kmyatnyein" },
            { id: "GIR", name: "Griona", logo: "https://upload.wikimedia.org/wikipedia/en/thumb/f/f7/Girona_FC_Logo.svg/1280px-Girona_FC_Logo.svg.png", tg: "https://t.me/Dean2172" },
            { id: "FIO", name: "Real Madrid", logo: "https://upload.wikimedia.org/wikipedia/sco/thumb/5/56/Real_Madrid_CF.svg/960px-Real_Madrid_CF.svg.png", tg: "https://t.me/AalDDin12" },
            { id: "COM", name: "Atalanta", logo: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQeE7lk4xdSGzlpEwx0VtBxbSY4vWtg3FodRakWKGWBEQ&s=10", tg: "https://t.me/Phaint_Phaint" },
            { id: "NAP", name: "", logo: "", tg: "" },
            { id: "ATA", name: "", logo: "", tg: "" },
            { id: "PAR", name: "Parma", logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/9/97/Logo_Parma_Calcio_1913_%28adozione_2016%29.svg/1280px-Logo_Parma_Calcio_1913_%28adozione_2016%29.svg.png", tg: "https://t.me/alpheo_x" },
            { id: "VER", name: "Yarmanya FC", logo: "https://upload.wikimedia.org/wikipedia/en/thumb/0/0d/Yarmanya_United_F.C._logo.png/250px-Yarmanya_United_F.C._logo.png", tg: "https://t.me/Xuman88" },
            { id: "TOR", name: "Rakhine United", logo: "https://upload.wikimedia.org/wikipedia/en/e/e2/Rakhine_United_Football_Club.jpg", tg: "https://t.me/kenzjust" },
            { id: "UDI", name: "ISPE FC", logo: "https://upload.wikimedia.org/wikipedia/en/9/98/I.S.P.E_F.C._logo.png", tg: "https://t.me/DjOmega4102005" },
            { id: "GEN", name: "Napoli", logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/2/2d/SSC_Neapel.svg/250px-SSC_Neapel.svg.png", tg: "https://t.me/alpheo_x" },
            { id: "CAG", name: "Athletic Bilbao", logo: "https://upload.wikimedia.org/wikipedia/en/thumb/9/98/Club_Athletic_Bilbao_logo.svg/250px-Club_Athletic_Bilbao_logo.svg.png", tg: "https://t.me/Alcohol0987" },
            { id: "EMP", name: "Yadanarbon FC", logo: "https://upload.wikimedia.org/wikipedia/en/8/83/Yadanabon_FC.png", tg: "https://t.me/Ranger13102003" }
        ];

        const KNOCKOUT_MATCHES = [
            { home: 'INT', away: 'EMP' },
            { home: 'MIL', away: 'CAG' },
            { home: 'JUV', away: 'GEN' },
            { home: 'LAZ', away: 'UDI' },
            { home: 'GIR', away: 'TOR' },
            { home: 'FIO', away: 'VER' },
            { home: 'COM', away: 'PAR' },
            { home: 'NAP', away: 'ATA' }
        ];

        function getTeamHtml(team, isAway = false) {
            const hasLink = team.tg && team.tg !== "#";
            const alignment = isAway ? "flex-row-reverse text-right" : "flex-row text-left";
            const classes = `flex items-center gap-2 w-[40%] ${alignment} ${hasLink ? "cursor-pointer hover:opacity-70" : ""}`;
            
            const content = `<img src="${team.logo}" class="w-8 h-8 object-contain"><span class="text-[10px] font-bold truncate w-20">${team.name}</span>`;
            
            if (hasLink) {
                return `<a href="${team.tg}" target="_blank" class="${classes}">${content}</a>`;
            }
            return `<div class="${classes}">${content}</div>`;
        }

        function renderFixtures() {
            const container = document.getElementById('fixtures-grid');
            container.innerHTML = '';
            
            KNOCKOUT_MATCHES.forEach(match => {
                const h = TEAMS_LIST.find(t => t.id === match.home);
                const a = TEAMS_LIST.find(t => t.id === match.away);
                
                const card = document.createElement('div');
                card.className = "bg-white border border-slate-100 rounded-xl p-3 flex items-center justify-between shadow-sm hover:shadow-md transition-all";
                
                card.innerHTML = `
                    ${getTeamHtml(h, false)}
                    <div class="flex flex-col items-center w-[20%]"><span class="text-[#003399] font-black text-[10px]">VS</span></div>
                    ${getTeamHtml(a, true)}
                `;
                container.appendChild(card);
            });
        }

        window.onload = renderFixtures;
    </script>
</body>
</html>
