<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ONE SUPER CUP - BRACKET</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #f1f5f9; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .tab-btn.active { background-color: #003399; color: white; border-bottom: 3px solid #fbbf24; }
    </style>
</head>
<body class="pb-10">

    <header class="bg-[#003399] p-5 shadow-lg sticky top-0 z-50">
        <h1 class="text-white text-center font-black tracking-widest text-lg">THE ONE SUPER CUP</h1>
    </header>

    <main class="max-w-2xl mx-auto px-3 py-5">
        <!-- Tabs Navigation -->
        <div class="grid grid-cols-4 gap-1 mb-6 bg-white p-1 rounded-xl shadow-sm">
            <button onclick="openTab('ro16')" class="tab-btn active px-2 py-3 rounded-lg text-[10px] font-bold uppercase transition">R16</button>
            <button onclick="openTab('qf')" class="tab-btn px-2 py-3 rounded-lg text-[10px] font-bold uppercase transition">QF</button>
            <button onclick="openTab('sf')" class="tab-btn px-2 py-3 rounded-lg text-[10px] font-bold uppercase transition">SF</button>
            <button onclick="openTab('final')" class="tab-btn px-2 py-3 rounded-lg text-[10px] font-bold uppercase transition">Final</button>
        </div>

        <div id="content-container">
            <section id="ro16" class="tab-content active bg-white rounded-2xl shadow-sm p-2"></section>
            <section id="qf" class="tab-content bg-white rounded-2xl shadow-sm p-2"></section>
            <section id="sf" class="tab-content bg-white rounded-2xl shadow-sm p-2"></section>
            <section id="final" class="tab-content bg-white rounded-2xl shadow-sm p-2"></section>
        </div>
    </main>

    <script>
        const TEAMS_LIST = [
            { id: "INT", name: "Leeds", logo: "https://upload.wikimedia.org/wikipedia/en/5/54/Leeds_United_F.C._logo.svg", tg: "https://t.me/jelium11" },
            { id: "MIL", name: "Liverpool", logo: "https://upload.wikimedia.org/wikipedia/en/0/0c/Liverpool_FC.svg", tg: "https://t.me/Badrul11" },
            { id: "JUV", name: "Man City", logo: "https://upload.wikimedia.org/wikipedia/en/thumb/e/eb/Manchester_City_FC_badge.svg/250px-Manchester_City_FC_badge.svg.png", tg: "https://t.me/iz_szlai" },
            { id: "LAZ", name: "Atletico Madrid", logo: "https://upload.wikimedia.org/wikipedia/en/f/f9/Atletico_Madrid_Logo_2024.svg", tg: "https://t.me/kmyatnyein" },
            { id: "GIR", name: "Girona", logo: "https://upload.wikimedia.org/wikipedia/en/thumb/f/f7/Girona_FC_Logo.svg/1280px-Girona_FC_Logo.svg.png", tg: "https://t.me/Dean2172" },
            { id: "FIO", name: "Real Madrid", logo: "https://upload.wikimedia.org/wikipedia/sco/thumb/5/56/Real_Madrid_CF.svg/960px-Real_Madrid_CF.svg.png", tg: "https://t.me/AalDDin12" },
            { id: "COM", name: "Atalanta", logo: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQeE7lk4xdSGzlpEwx0VtBxbSY4vWtg3FodRakWKGWBEQ&s=10", tg: "https://t.me/Phaint_Phaint" },
            { id: "ATA", name: "Lazio", logo: "https://upload.wikimedia.org/wikipedia/en/thumb/c/ce/S.S._Lazio_badge.svg/1280px-S.S._Lazio_badge.svg.png", tg: "https://t.me/tnmnt46" },
            { id: "UDI", name: "ISPE FC", logo: "https://upload.wikimedia.org/wikipedia/en/9/98/I.S.P.E_F.C._logo.png", tg: "https://t.me/DjOmega4102005" },
            { id: "GEN", name: "Napoli", logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/2/2d/SSC_Neapel.svg/250px-SSC_Neapel.svg.png", tg: "https://t.me/alpheo_x" },
            { id: "CAG", name: "Athletic Bilbao", logo: "https://upload.wikimedia.org/wikipedia/en/thumb/9/98/Club_Athletic_Bilbao_logo.svg/250px-Club_Athletic_Bilbao_logo.svg.png", tg: "https://t.me/Alcohol0987" },
            { id: "EMP", name: "Yadanarbon FC", logo: "https://upload.wikimedia.org/wikipedia/en/8/83/Yadanabon_FC.png", tg: "https://t.me/Ranger13102003" },
            { id: "VER", name: "Yarmanya FC", logo: "https://upload.wikimedia.org/wikipedia/en/thumb/0/0d/Yarmanya_United_F.C._logo.png/250px-Yarmanya_United_F.C._logo.png", tg: "https://t.me/Xuman88" },
            { id: "PAR", name: "Parma", logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/9/97/Logo_Parma_Calcio_1913_%28adozione_2016%29.svg/1280px-Logo_Parma_Calcio_1913_%28adozione_2016%29.svg.png", tg: "https://t.me/alpheo_x" },
            { id: "TOR", name: "Rakhine United", logo: "https://upload.wikimedia.org/wikipedia/en/e/e2/Rakhine_United_Football_Club.jpg", tg: "https://t.me/kenzjust" },
            { id: "MUN", name: "Man United", logo: "https://upload.wikimedia.org/wikipedia/en/thumb/7/7a/Manchester_United_FC_crest.svg/1280px-Manchester_United_FC_crest.svg.png", tg: "https://t.me/Hemaljr10" }
        ];

        const STAGES = {
            ro16: [
                { home: 'Leeds', away: 'Yadanarbon FC', score: '5 - 4' },
                { home: 'Liverpool', away: 'Athletic Bilbao', score: '14 - 8' },
                { home: 'Man City', away: 'Napoli', score: '6 - 5' },
                { home: 'Atletico Madrid', away: 'ISPE FC', score: '4 - 2' },
                { home: 'Girona', away: 'Rakhine United', score: '4 - 1' },
                { home: 'Real Madrid', away: 'Yarmanya FC', score: '5 - 3' },
                { home: 'Atalanta', away: 'Parma', score: '7 - 6' },
                { home: 'Man United', away: 'Lazio', score: '8 - 9' }
            ],
            qf: [
                { home: 'Leeds', away: 'Liverpool', score: '3 - 7' },
                { home: 'Man City', away: 'Atletico Madrid', score: '5 - 6' },
                { home: 'Girona', away: 'Real Madrid', score: '9 - 5' },
                { home: 'Atalanta', away: 'Lazio', score: '2 - 3' }
            ],
            sf: [
                { home: 'Liverpool', away: 'Atletico Madrid', score: 'Vs' },
                { home: 'Girona', away: 'Lazio', score: 'Vs' }
            ],
            final: [
                { home: 'TBA', away: 'TBA', score: 'Vs' }
            ]
        };

        function openTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function createMatchCard(match) {
            const hTeam = TEAMS_LIST.find(t => t.name === match.home) || { name: match.home, logo: 'https://placehold.co/40x40/eee/333?text=?', tg: '#' };
            const aTeam = TEAMS_LIST.find(t => t.name === match.away) || { name: match.away, logo: 'https://placehold.co/40x40/eee/333?text=?', tg: '#' };
            
            const div = document.createElement('div');
            div.className = "flex items-center justify-between p-4 border-b last:border-0 border-slate-50";
            
            const homeLink = hTeam.tg !== '#' ? `onclick="window.open('${hTeam.tg}', '_blank')"` : '';
            const awayLink = aTeam.tg !== '#' ? `onclick="window.open('${aTeam.tg}', '_blank')"` : '';

            div.innerHTML = `
                <div class="flex items-center gap-3 w-[40%] cursor-pointer" ${homeLink}><img src="${hTeam.logo}" class="w-8 h-8 object-contain"><span class="text-[12px] font-bold truncate">${hTeam.name}</span></div>
                <div class="text-black font-black text-xs w-[20%] text-center bg-slate-100 py-1 px-2 rounded-md">${match.score}</div>
                <div class="flex items-center gap-3 w-[40%] justify-end text-right cursor-pointer" ${awayLink}><span class="text-[12px] font-bold truncate">${aTeam.name}</span><img src="${aTeam.logo}" class="w-8 h-8 object-contain"></div>
            `;
            return div;
        }

        function renderAll() {
            Object.keys(STAGES).forEach(key => {
                const container = document.getElementById(key);
                STAGES[key].forEach(m => container.appendChild(createMatchCard(m)));
            });
        }

        window.onload = renderAll;
    </script>
</body>
</html>
